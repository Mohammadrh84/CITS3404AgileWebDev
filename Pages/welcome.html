<!DOCTYPE html>
<html>
    <head>
        <title>Spurdle</title>

        <link rel="stylesheet" href="style.css">

        <script src="https://cdn.tailwindcss.com"></script>
        <!-- Import custom configuration (fonts and colours)-->
        <script src="../Scripts/tailwind-config.js"></script>
    </head>

    <body class="bg-background-black">
        <div class="min-h-screen flex flex-col items-center justify-start pt-15">
            <h1 class="font-syne text-[125px] text-white text-center mt-[125px]">
                <span class="text-white">spu</span><span class="text-neon-green">rdle</span>
            </h1>
            <p class="text-white text-xl">Select your favourite artists, guess their songs. The less hints you use,</p>
            <p class="text-white text-xl">the more points you get.</p>

            <div class="flex flex-row gap-5 mt-8">
                    <button class="bg-neon-green text-black px-6 py-3 rounded-lg hover:scale-105 hover:shadow-[0_0_10px_#3Dff6e] transition-transform duration-200">
                        Start playing
                    </button>
                    <button class="bg-white text-background-black px-6 py-3 rounded-lg hover:scale-105 transition-transform duration-200">
                        Leaderboard
                    </button>
            </div>
        </div>
    </body>
</html>
